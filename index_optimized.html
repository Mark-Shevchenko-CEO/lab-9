<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Chef</title>

  <!--Оптимізація 1: preconnect для скорочення часу DNS-lookup шрифтів-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!--Оптимізація 2: display=swap - текст видно ще до завантаження шрифту-->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

  <!--Оптимізація 3: CSS інлайн усуває блокуючий рендер-->
  <style>
    :root{--cream:#fdf6ec;--warm:#f5e6ce;--red:#c94040;--red-dark:#a33030;--green:#3d7a4f;--text:#1c1410;--muted:#7a6a5a;--card-bg:#ffffff;--shadow:0 4px 24px rgba(0,0,0,.08);--radius:16px;--font-display:'Playfair Display',Georgia,serif;--font-body:'Nunito',Arial,sans-serif}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{font-family:var(--font-body);background:var(--cream);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
    .header{background:var(--card-bg);border-bottom:2px solid var(--warm);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.06)}
    .header-inner{max-width:1100px;margin:auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
    .logo{font-family:var(--font-display);font-size:1.5rem;font-weight:900;color:var(--red);letter-spacing:-.5px}
    .nav{display:flex;gap:8px}
    .nav a{font-family:var(--font-body);font-weight:600;font-size:.9rem;text-decoration:none;color:var(--muted);padding:8px 16px;border-radius:50px;transition:background .2s,color .2s}
    .nav a:hover,.nav a.active{background:var(--red);color:#fff}
    .app-main{flex:1;max-width:1100px;margin:0 auto;width:100%;padding:32px 24px}
    .spinner{width:44px;height:44px;border:4px solid var(--warm);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>

  <link rel="preload" href="styles.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="styles.css"></noscript>
</head>
<body>

  <main id="app" class="app-main"></main>

  <script type="module" src="main.js"></script>
</body>
</html>
